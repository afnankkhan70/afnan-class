<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afnan Khan's Class — Attendance System</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#f4f6f9;min-height:100vh;color:#1a1a2e}
  .hidden{display:none!important}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
  .login-box{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
  .login-logo{text-align:center;margin-bottom:28px}
  .login-logo h2{font-size:22px;font-weight:700;color:#1a1a2e;margin-top:10px}
  .login-logo p{font-size:13px;color:#888;margin-top:4px}
  .role-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
  .role-btn{padding:12px;border:2px solid #e0e0e0;border-radius:10px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;color:#555}
  .role-btn.active{border-color:#0f3460;background:#0f3460;color:#fff}
  .form-group{margin-bottom:16px}
  .form-group label{font-size:13px;font-weight:600;color:#444;display:block;margin-bottom:6px}
  .form-group input{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;transition:border .2s}
  .form-group input:focus{border-color:#0f3460}
  .login-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0f3460,#e94560);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .2s,box-shadow .2s;margin-top:6px}
  .login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(15,52,96,0.4)}
  .error-msg{color:#e94560;font-size:13px;margin-top:10px;text-align:center;min-height:18px}
  .app{min-height:100vh;background:#f4f6f9}
  .topbar{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;padding:16px 28px;display:flex;justify-content:space-between;align-items:center}
  .topbar h1{font-size:18px;font-weight:700}
  .topbar span{font-size:13px;opacity:.75}
  .logout-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;transition:background .2s}
  .logout-btn:hover{background:rgba(255,255,255,0.22)}
  .main{padding:28px}
  .student-card{background:#fff;border-radius:16px;padding:32px;max-width:500px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center}
  .student-card h2{font-size:20px;font-weight:700;margin-bottom:6px;color:#1a1a2e}
  .student-card p{font-size:14px;color:#888;margin-bottom:28px}
  .present-btn{background:linear-gradient(135deg,#11998e,#38ef7d);color:#fff;border:none;padding:18px 48px;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 24px rgba(17,153,142,0.35)}
  .present-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 10px 32px rgba(17,153,142,0.5)}
  .present-btn:disabled{background:#ccc;cursor:not-allowed;box-shadow:none;transform:none}
  .present-btn.marked{background:linear-gradient(135deg,#667eea,#764ba2)}
  .attendance-info{margin-top:24px;padding:16px;background:#f8f9ff;border-radius:12px;font-size:14px;text-align:left}
  .warning-box{margin-top:16px;padding:14px;background:#fff3f3;border:1px solid #ffcdd2;border-radius:10px;color:#c62828;font-size:13px;font-weight:600}
  .info-box{margin-top:16px;padding:14px;background:#e8f5e9;border:1px solid #c8e6c9;border-radius:10px;color:#2e7d32;font-size:13px}
  .today-status{margin-top:12px;font-size:13px;color:#888}
  .days-grid{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px}
  .day-dot{width:10px;height:10px;border-radius:50%;background:#e0e0e0}
  .day-dot.present{background:#11998e}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
  .stat-box{background:#fff;border-radius:14px;padding:22px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.06);animation:countUp .5s ease both}
  .stat-box:nth-child(2){animation-delay:.1s}
  .stat-box:nth-child(3){animation-delay:.2s}
  .stat-box .num{font-size:32px;font-weight:800;background:linear-gradient(135deg,#0f3460,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stat-box .lbl{font-size:12px;color:#999;margin-top:4px}
  .students-table{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
  .students-table h3{font-size:16px;font-weight:700;margin-bottom:18px;color:#1a1a2e}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;padding:10px 12px;background:#f8f9ff;color:#555;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  td{padding:12px;border-bottom:1px solid #f0f0f0;color:#333}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafbff}
  .pct-bar{height:6px;background:#e0e0e0;border-radius:3px;margin-top:5px;overflow:hidden}
  .pct-fill{height:100%;border-radius:3px;transition:width .8s ease}
  .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
  .badge.good{background:#e8f5e9;color:#2e7d32}
  .badge.warn{background:#fff3e0;color:#e65100}
  .badge.bad{background:#ffebee;color:#c62828}
  .badge.new{background:#e3f2fd;color:#1565c0}
  @keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div style="font-size:36px">🎓</div>
      <h2>Afnan Khan's Class</h2>
      <p>Attendance Management System</p>
    </div>
    <div class="role-btns">
      <button class="role-btn active" onclick="setRole('student')" id="btnStudent">👨‍🎓 Student</button>
      <button class="role-btn" onclick="setRole('teacher')" id="btnTeacher">👨‍🏫 Teacher</button>
    </div>
    <div class="form-group" id="emailGroup">
      <label>Email Address</label>
      <input type="email" id="emailInput" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="passInput" placeholder="Enter password">
    </div>
    <button class="login-btn" onclick="doLogin()">Login →</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app hidden" id="appScreen">
  <div class="topbar">
    <div>
      <h1>🎓 Afnan Khan's Class</h1>
      <span id="topSub">Attendance System</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<script>
const STUDENTS=[
  {email:'ahmed.khan@gmail.com',name:'Ahmed Khan'},
  {email:'sara.malik@gmail.com',name:'Sara Malik'},
  {email:'bilal.ahmed@gmail.com',name:'Bilal Ahmed'},
  {email:'fatima.noor@gmail.com',name:'Fatima Noor'},
  {email:'usman.ali@gmail.com',name:'Usman Ali'},
  {email:'ayesha.raza@gmail.com',name:'Ayesha Raza'},
  {email:'hamza.tariq@gmail.com',name:'Hamza Tariq'},
  {email:'zainab.shah@gmail.com',name:'Zainab Shah'},
  {email:'imran.butt@gmail.com',name:'Imran Butt'},
  {email:'hira.baig@gmail.com',name:'Hira Baig'},
];
const PASS_STUDENT='123';
const PASS_TEACHER='1717';
let currentRole='student';
let currentUser=null;

function getStorage(){try{const d=localStorage.getItem('classAtt2');return d?JSON.parse(d):{}}catch(e){return{}}}
function saveStorage(data){try{localStorage.setItem('classAtt2',JSON.stringify(data))}catch(e){}}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}
function getLast30Days(){const days=[];for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate())}return days}
function daysSinceFirst(email){const data=getStorage();if(!data[email]||!data[email]._firstLogin)return 0;const start=new Date(data[email]._firstLogin);const now=new Date();return Math.floor((now-start)/(1000*60*60*24))}
function getAttendance(email){const data=getStorage();return data[email]||{}}
function getPct(email){const att=getAttendance(email);const days=getLast30Days();const present=days.filter(d=>att[d]&&d!=='_firstLogin').length;return Math.round((present/30)*100)}
function isBlocked(email){const days=daysSinceFirst(email);if(days<30)return false;return getPct(email)<70}
function setRole(role){currentRole=role;document.getElementById('btnStudent').classList.toggle('active',role==='student');document.getElementById('btnTeacher').classList.toggle('active',role==='teacher');document.getElementById('emailGroup').style.display=role==='student'?'block':'none';document.getElementById('errorMsg').textContent=''}
function doLogin(){
  const email=document.getElementById('emailInput').value.trim().toLowerCase();
  const pass=document.getElementById('passInput').value;
  document.getElementById('errorMsg').textContent='';
  if(currentRole==='teacher'){
    if(pass===PASS_TEACHER){currentUser={role:'teacher'};showApp();}
    else document.getElementById('errorMsg').textContent='Wrong password!';
  }else{
    const student=STUDENTS.find(s=>s.email===email);
    if(!student){document.getElementById('errorMsg').textContent='Email not found!';return;}
    if(pass!==PASS_STUDENT){document.getElementById('errorMsg').textContent='Wrong password!';return;}
    const data=getStorage();
    if(!data[email])data[email]={};
    if(!data[email]._firstLogin){data[email]._firstLogin=todayKey();saveStorage(data);}
    currentUser={role:'student',email,name:student.name};
    showApp();
  }
}
function doLogout(){currentUser=null;document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('appScreen').classList.add('hidden');document.getElementById('passInput').value='';document.getElementById('emailInput').value=''}
function showApp(){document.getElementById('loginScreen').classList.add('hidden');document.getElementById('appScreen').classList.remove('hidden');document.getElementById('topSub').textContent=currentUser.role==='teacher'?'Teacher Dashboard':'Student Portal — '+currentUser.name;currentUser.role==='teacher'?renderTeacher():renderStudent()}
function markPresent(){const email=currentUser.email;const data=getStorage();if(!data[email])data[email]={};data[email][todayKey()]=true;saveStorage(data);renderStudent()}
function renderStudent(){
  const email=currentUser.email;
  const att=getAttendance(email);
  const today=todayKey();
  const markedToday=att[today]||false;
  const days=getLast30Days();
  const presentCount=days.filter(d=>att[d]&&d!=='_firstLogin').length;
  const daysIn=daysSinceFirst(email);
  const pct=getPct(email);
  const blocked=isBlocked(email);
  const after30=daysIn>=30;
  let html=`<div class="student-card"><h2>Hello, ${currentUser.name}! 👋</h2><p>Mark your attendance for today — ${new Date().toDateString()}</p>`;
  if(blocked){html+=`<div class="warning-box">🚫 Your attendance is ${pct}% after 30 days — below 70%. You can no longer mark attendance. Please contact your teacher.</div>`;}
  else{html+=`<button class="present-btn ${markedToday?'marked':''}" onclick="markPresent()" ${markedToday?'disabled':''}>${markedToday?'✅ Already Marked Today':'✋ Mark Present'}</button>`;if(markedToday)html+=`<div class="today-status">✅ Attendance marked for today!</div>`;}
  if(!after30){html+=`<div class="info-box">📅 You are in your first 30 days. Keep attending regularly! (Day ${daysIn+1} of 30)</div>`;}
  else if(!blocked){html+=`<div class="info-box">✅ Your attendance: ${pct}% — Keep it above 70%!</div>`;}
  html+=`<div class="attendance-info"><strong>Your Last 30 Days:</strong><div class="days-grid">`;
  days.forEach(d=>{html+=`<div class="day-dot ${att[d]&&d!=='_firstLogin'?'present':''}" title="${d}"></div>`;});
  html+=`</div><div style="margin-top:10px;font-size:13px;color:#666">🟢 Present &nbsp;&nbsp; ⚪ Absent &nbsp;&nbsp; Total: ${presentCount}/30 days</div></div></div>`;
  document.getElementById('mainContent').innerHTML=html;
}
function renderTeacher(){
  const today=todayKey();
  let presentToday=0;
  STUDENTS.forEach(s=>{const att=getAttendance(s.email);if(att[today])presentToday++;});
  const avgPct=Math.round(STUDENTS.reduce((sum,s)=>sum+getPct(s.email),0)/STUDENTS.length);
  let html=`<div class="stats-grid">
    <div class="stat-box"><div class="num">${STUDENTS.length}</div><div class="lbl">Total Students</div></div>
    <div class="stat-box"><div class="num">${presentToday}</div><div class="lbl">Present Today</div></div>
    <div class="stat-box"><div class="num">${avgPct}%</div><div class="lbl">Avg Attendance</div></div>
  </div>
  <div class="students-table"><h3>📋 Student Attendance — Last 30 Days</h3>
  <table><thead><tr><th>Student</th><th>Email</th><th>Attendance</th><th>Days In</th><th>Status</th></tr></thead><tbody>`;
  STUDENTS.forEach(s=>{
    const att=getAttendance(s.email);
    const days=getLast30Days();
    const presentCount=days.filter(d=>att[d]&&d!=='_firstLogin').length;
    const pct=getPct(s.email);
    const daysIn=daysSinceFirst(s.email);
    const after30=daysIn>=30;
    const blocked=isBlocked(s.email);
    const color=pct>=70?'#11998e':pct>=50?'#f59e0b':'#e94560';
    const todayMark=att[today]?'✅':'—';
    const badgeClass=blocked?'bad':!after30?'new':'good';
    const badgeText=blocked?'Blocked':!after30?'In Progress':'Active';
    let dots='';
    days.forEach(d=>{dots+=`<div class="day-dot ${att[d]&&d!=='_firstLogin'?'present':''}" style="width:8px;height:8px"></div>`;});
    html+=`<tr>
      <td><strong>${s.name}</strong><br><small style="color:#999">${todayMark} Today</small></td>
      <td style="font-size:12px;color:#888">${s.email}</td>
      <td><strong>${pct}%</strong> <span style="font-size:12px;color:#999">(${presentCount}/30)</span>
        <div class="pct-bar"><div class="pct-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="days-grid">${dots}</div></td>
      <td style="font-size:13px">Day ${Math.min(daysIn+1,30)}/30</td>
      <td><span class="badge ${badgeClass}">${badgeText}</span></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('mainContent').innerHTML=html;
}
</script>
</body>
</html>
